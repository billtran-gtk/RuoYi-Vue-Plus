<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .app-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .version {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .file-list {
            margin-top: 30px;
            text-align: left;
        }

        .file-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name {
            font-weight: 500;
            color: #333;
            flex: 1;
            word-break: break-all;
        }

        .file-size {
            color: #999;
            font-size: 12px;
            margin-right: 10px;
        }

        .download-link {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }

        .download-link:hover {
            background: #764ba2;
        }

        .loading {
            color: #666;
            margin-top: 20px;
        }

        .error {
            color: #e74c3c;
            margin-top: 20px;
        }

        .info {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">📱</div>
        <h1>APP下载中心</h1>
        <p class="version" id="versionInfo">正在加载...</p>

        <button class="download-btn" id="downloadLatest" onclick="downloadLatest()">
            下载最新版本
        </button>

        <div class="file-list" id="fileList"></div>

        <div class="info">
            <strong>温馨提示：</strong><br>
            • 请在WiFi环境下下载，避免消耗流量<br>
            • 下载完成后请允许安装未知来源应用<br>
            • 如遇下载问题，请联系技术支持
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // 下载最新版本
        async function downloadLatest() {
            const btn = document.getElementById('downloadLatest');
            btn.disabled = true;
            btn.textContent = '正在获取...';

            try {
                const response = await fetch(`${API_BASE}/system/apk/latest`);
                const result = await response.json();

                if (result.code === 200 && result.data) {
                    window.location.href = `${API_BASE}${result.data.downloadUrl}`;
                    btn.textContent = '下载最新版本';
                } else {
                    alert('未找到可用的APK文件');
                    btn.textContent = '下载最新版本';
                }
            } catch (error) {
                console.error('下载失败:', error);
                alert('下载失败，请稍后重试');
                btn.textContent = '下载最新版本';
            } finally {
                btn.disabled = false;
            }
        }

        // 加载APK列表
        async function loadApkList() {
            const fileListDiv = document.getElementById('fileList');
            const versionInfo = document.getElementById('versionInfo');

            try {
                const response = await fetch(`${API_BASE}/system/apk/list`);
                const result = await response.json();

                if (result.code === 200 && result.data && result.data.length > 0) {
                    versionInfo.textContent = `共有 ${result.data.length} 个版本可供下载`;

                    let html = '<h3 style="margin-bottom: 15px; color: #333;">所有版本</h3>';
                    result.data.forEach(apk => {
                        html += `
                            <div class="file-item">
                                <span class="file-name">${apk.fileName}</span>
                                <span class="file-size">${formatFileSize(parseInt(apk.fileSize))}</span>
                                <a href="${API_BASE}${apk.downloadUrl}" class="download-link" download>下载</a>
                            </div>
                        `;
                    });
                    fileListDiv.innerHTML = html;
                } else {
                    versionInfo.textContent = '暂无可用版本';
                    fileListDiv.innerHTML = '<p class="error">暂无APK文件，请联系管理员上传</p>';
                    document.getElementById('downloadLatest').disabled = true;
                }
            } catch (error) {
                console.error('加载列表失败:', error);
                versionInfo.textContent = '加载失败';
                fileListDiv.innerHTML = '<p class="error">加载失败，请刷新页面重试</p>';
            }
        }

        // 页面加载时获取APK列表
        window.onload = loadApkList;
    </script>
</body>
</html>
